# Eleven Rack (0dba:b011) WirePlumber tuning -- userspace only; the kernel
# driver is independent of this. Drop into a WirePlumber 0.5 / PipeWire 1.x
# config dir (e.g. ~/.config/wireplumber/wireplumber.conf.d/51-eleven-rack.conf
# or /etc/wireplumber/wireplumber.conf.d/), or apply via the NixOS module
# wireplumber-eleven-rack.nix.
#
# Why:
#  - The playback endpoint is async (device is clock master) and its implicit
#    feedback is unusable, so PipeWire resamples to the device rate. Letting the
#    node suspend makes that clock lock re-converge (audibly choppy) on every
#    start; session.suspend-timeout-seconds = 0 keeps it locked.
#  - Force a sensible channel layout instead of a guessed 5.1/7.1: Main Out as
#    FL/FR (so ordinary stereo playback reaches the headphones) and the rest
#    discrete AUX.
#
# Channel map (from the Avid manual, confirmed by signal-generator capture):
#   playback  FL,FR = Main L/R (mirrored to Phones); AUX2/3 = ReAmp L/R;
#             AUX4/5 = Digital Out L/R
#   capture   AUX0..7 = Guitar In (dry), Mic In, Rig L, Rig R (wet), Digital
#             In L/R, Line In L/R
monitor.alsa.rules = [
  {
    matches = [ { node.name = "~alsa_output.usb-Digidesign_Eleven_Rack.*" } ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
        audio.position = [ FL FR AUX2 AUX3 AUX4 AUX5 ]
      }
    }
  }
  {
    matches = [ { node.name = "~alsa_input.usb-Digidesign_Eleven_Rack.*" } ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
        audio.position = [ AUX0 AUX1 AUX2 AUX3 AUX4 AUX5 AUX6 AUX7 ]
      }
    }
  }
]
